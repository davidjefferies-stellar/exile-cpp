; exile.ini — startup configuration loaded by Game::init.
;
; Format: [section] headers, key = value lines.
; Comments start with ; or # and run to end of line.
; Numbers can be decimal (42) or hex (0x2a).
;
; Missing keys / sections fall back to the hard-coded defaults that
; reproduce the original game's spawn state. Delete this file to get
; the defaults; rename to e.g. exile.dev.ini and copy to enable.

[player]
; Starting tile position (0..255 each axis). World wraps every 256
; tiles; the original spawn is 0x9B, 0x3B (the upper-world surface).
start_x = 0x9B
start_y = 0x3B
;start_x = 170
;start_y = 78
;start_x = 164
;start_y = 78
;start_x = 185
;start_y = 192


; Starting suit energy (0..255). 0xff = full. The HUD bar uses this.
energy = 0xff

; Selected weapon slot. Names accepted: jetpack, pistol, icer, blaster,
; plasma (or plasma_gun), suit (or protection_suit). Numeric 0..5 also
; works.
weapon = plasma

[weapon_energy]
; Initial ammo per weapon slot (16-bit, 0..65535). The icer costs 0x10
; per shot, so 0x0800 = ~128 shots.
jetpack = 0x0800
pistol  = 0x0800
icer    = 0x0800
blaster = 0x0800
plasma  = 0x0800
suit    = 0

[caches]
; How many primary / secondary slots the world can use at once. Both are
; clamped at load time to the compile-time ceilings in core/types.h
; (PRIMARY_OBJECT_SLOTS = 64, SECONDARY_OBJECT_SLOTS = 128). Defaults
; reproduce the 6502 ROM (16 / 32). Raising these lets more primaries be
; simultaneously active around the player — useful for wider viewports
; where the BBC's 15 non-player primaries run out before every visible
; tile's tertiary has a chance to spawn.
;
;   primary_slots   : includes slot 0 (the player), so 16 = player + 15
;                     simultaneous other primaries. Each slot is ~22
;                     bytes; raising to 64 costs ~1 KB.
;   secondary_slots : offscreen-but-remembered objects. 4 bytes each,
;                     so doubling costs ~128 bytes.
primary_slots   = 64
secondary_slots = 64

[distances]
; Activation-ring radii (in tiles) for the primary / secondary / tertiary
; caches. These govern how close the activation anchor (player, or camera
; centre in map mode) has to be for each cache transition. Larger values
; mean more things are "live" at once.
;
;   demote_tertiary   : primary -> tertiary radius for statics (doors,
;                       switches, KEEP_AS_TERTIARY). 6502 ROM: 1.
;   demote_moving     : primary -> (secondary | tertiary) radius for
;                       moving / airborne KEEP_AS_PRIMARY_FOR_LONGER
;                       objects. 6502 ROM: 12. Larger values keep
;                       thrown/flying stuff live further away.
;   demote_settled    : same as above once the object is slow AND
;                       supported. 6502 ROM: 4.
;   promote_secondary : secondary -> primary radius (how close you must
;                       get before a demoted object re-promotes).
;                       6502 ROM: 4.
;   spawn_tertiary    : tile tertiary -> primary spawn-gate radius used
;                       by render's spawn_tertiary_object. Keep this in
;                       sync with demote_settled or objects will
;                       oscillate between spawned and demoted every few
;                       frames.
; demote_tertiary raised from the 6502's 1 to match spawn_tertiary — the
; port hazard documented in object_manager.cpp:388 (churn every 4 frames
; when demote ring < spawn ring on our wider viewport).
;
; All four radii doubled from the 6502-faithful defaults (4 / 12 / 4 / 4 /
; 4) so the primary-pool activation zone is ~2x the area the ROM used.
; Keep demote_settled == spawn_tertiary and demote_tertiary >= spawn_tertiary
; to avoid the spawn/demote oscillation documented above; promote_secondary
; needs to be <= demote_settled or promoted objects re-demote on the next
; lifecycle tick. Doubling all four keeps those invariants.
demote_tertiary   = 16
demote_moving     = 24
demote_settled    = 16
promote_secondary = 16
spawn_tertiary    = 16

[landscape]
; Pick which procedural landscape generator runs.
;   false : pseudo-6502 reference (landscape.cpp). Tracks A/C through an
;           Alu struct; matches the 6502 disassembly line-for-line.
;   true  : native C++ rewrite (landscape_cpp.cpp). Same algorithm,
;           expressed with implicit uint8_t wraparound and explicit
;           carry only where consumed.
;
; The two paths are intended to produce byte-identical maps; the toggle
; exists so the rewrite can be A/B-tested against the reference. Default
; false (the reference).
use_cpp_impl = false

[whistles]
; Whistle collected flags (ports of &0816 player_whistle_one_collected
; and &0817 player_whistle_two_collected). When true, pressing Y / U
; triggers the whistle effect immediately — Y activates Chatter,
; U makes Chatter produce a power pod — without needing to pick up
; the whistle primary. Set to false to replay the discovery path
; where the player has to walk to the whistle and touch it first.
; Accepted values: true/false, yes/no, on/off, 1/0.
whistle_one_collected = true
whistle_two_collected = true

[keys]
; Port of &0806 player_keys_collected. Each key marks a bit in the
; player's key-collected bitmask; doors read that bitmask (not the
; pocket stack) when hit by the RCD. Firing the RCD at a door toggles
; DOOR_FLAG_LOCKED iff the matching key is collected here; unlocked
; doors respond to touch to open/close.
;
; In-game, the player collects keys by picking them up — the key
; primary is consumed and the matching bit is set. This section
; pre-sets bits so testing doesn't require walking to every key tile.
;
; Each entry accepts true/false, yes/no, on/off, 1/0. Default false.
cyan_yellow_green_key = false
red_yellow_green_key  = false
green_yellow_red_key  = true
yellow_white_red_key  = false
red_magenta_red_key   = false
blue_cyan_green_key   = false

[pockets]
; Up to 5 pocket slots. slot0 is the top of the stack — pressing R
; pulls slot0 out as the held object.
;
; Values are object-type names (matching ObjectType enum spellings) or
; raw numbers. Useful pickups:
;   icer, pistol, blaster, plasma_gun, protection_suit,
;   power_pod, coronium_crystal, fluffy, mushroom_immunity_pill,
;   whistle_one, whistle_two, fire_immunity_device,
;   radiation_immunity_pill, alien_weapon, blue_mushroom_ball,
;   red_mushroom_ball, active_grenade, remote_control_device,
;   cannon_control_device.
;
; Keys are NOT stored here — use [keys] above. Putting a key name in
; a slot here would park an un-collected key object in the pocket
; stack, which isn't how the 6502 handles them.
;
; Slots above the first empty one are ignored — the stack is contiguous.

slot0 = coronium_crystal
slot1 = inactive_grenade
slot2 = remote_control_device
slot3 = empty_flask
;slot4 = empty_flask
